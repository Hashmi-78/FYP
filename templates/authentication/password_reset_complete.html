{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete - Ahyera Store</title>
    <link href="{% static 'css/output.css' %}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-lg p-10 w-full max-w-md text-center">
        <i class="fas fa-check-circle text-green-500 text-6xl mb-4"></i>
        <h1 class="text-3xl font-bold text-blue-900 mb-2">Password Reset Complete</h1>
        <p class="text-gray-600 mb-6">Your password has been set successfully. You can now log in with your new password.</p>
        <a href="{% url 'authentication:login' %}"
            class="inline-block bg-blue-900 text-white px-8 py-3 rounded-lg font-bold hover:bg-blue-800 transition">
            <i class="fas fa-sign-in-alt mr-2"></i> Go to Login
        </a>
    </div>
</body>
</html>
