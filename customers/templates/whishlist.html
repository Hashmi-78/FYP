<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Wishlist • Ahyera Store</title>
<script defer src="./whishlist.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .font-logo { font-family: 'Playfair Display', serif; }
    .font-body { font-family: 'Inter', sans-serif; }
    .hover-lift { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .hover-lift:hover { transform: translateY(-12px); box-shadow: 0 30px 60px rgba(20, 94, 253, 0.18); }
    .heart-active { color: #ec4899 !important; animation: beat 0.6s ease; }
    @keyframes beat { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3); } }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-pink-50 font-body min-h-screen">

  <!-- Premium Navbar -->
  <nav class="sticky top-0 z-50 bg-white/95 backdrop-blur-lg shadow-xl border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="w-14 h-14 bg-gradient-to-br from-[#145efd] to-pink-600 rounded-full flex-center text-white text-2xl font-bold shadow-2xl">AS</div>
        <h1 class="text-4xl font-logo bg-gradient-to-r from-[#145efd] to-pink-600 bg-clip-text text-transparent">Ahyera Store</h1>
      </div>
      <div class="flex items-center gap-10">
        <a href="customer_home.html" class="text-lg font-medium hover:text-pink-600 transition">Home</a>
        <a href="wishlist.html" class="text-lg font-bold text-pink-600 flex items-center gap-2">
          <i class="far fa-heart text-2xl"></i> Wishlist (<span id="wishlist-count">0</span>)
        </a>
        <a href="#" class="relative">
          <i class="fas fa-shopping-bag text-2xl"></i>
          <span class="absolute -top-2 -right-3 bg-pink-600 text-white text-xs font-bold w-7 h-7 rounded-full flex-center">3</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="bg-gradient-to-r from-[#145efd] via-purple-600 to-pink-600 py-24 text-center text-white">
    <div class="max-w-5xl mx-auto px-6">
      <h1 class="text-6xl md:text-7xl font-logo font-bold mb-6">Your Dream Collection</h1>
      <p class="text-2xl opacity-90">Items you've saved with love</p>
    </div>
  </section>

  <!-- Wishlist Content -->
  <section class="py-20">
    <div class="max-w-7xl mx-auto px-6">

      <!-- Empty State - Luxury -->
      <div id="empty-state" class="text-center py-32">
        <div class="w-48 h-48 mx-auto mb-10 bg-gradient-to-br from-pink-100 to-purple-100 rounded-full flex-center opacity-80">
          <i class="far fa-heart text-9xl text-pink-300"></i>
        </div>
        <h2 class="text-5xl font-logo font-bold text-gray-700 mb-4">Your Wishlist is Empty</h2>
        <p class="text-xl text-gray-600 mb-10">Start adding your favorite luxury items!</p>
        <a href="customer_home.html" class="inline-block bg-gradient-to-r from-[#145efd] to-pink-600 text-white px-12 py-5 rounded-full text-xl font-bold hover:shadow-2xl transition transform hover:scale-105">
          Explore Collection
        </a>
      </div>

      <!-- Wishlist Table -->
      <div id="wishlist-container" class="hidden">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
          <div id="wishlist-items">
            <!-- Items injected by JS -->
          </div>
        </div>

        <!-- Total -->
        <div class="mt-12 bg-white rounded-3xl shadow-2xl p-10 border border-gray-100">
          <div class="flex justify-between items-center mb-8">
            <div>
              <h3 class="text-3xl font-logo font-bold">Total Wishlist Value</h3>
              <p class="text-gray-600 text-lg">Ready to make these yours?</p>
            </div>
            <p class="text-5xl font-bold bg-gradient-to-r from-[#145efd] to-pink-600 bg-clip-text text-transparent">
              PKR <span id="total-price">0</span>
            </p>
          </div>
          <button id="move-all-btn" class="w-full bg-gradient-to-r from-[#145efd] to-pink-600 text-white py-6 rounded-2xl text-2xl font-bold hover:shadow-2xl transition transform hover:scale-105">
            <i class="fas fa-shopping-bag mr-3"></i> Move All to Cart
          </button>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-gray-900 text-white py-16 text-center">
    <h1 class="text-6xl font-logo bg-gradient-to-r from-[#145efd] to-pink-600 bg-clip-text text-transparent mb-4">Ahyera Store</h1>
    <p class="text-xl">Pakistan's Most Loved Luxury Brand • 2025</p>
  </footer>

</body>
</html>
