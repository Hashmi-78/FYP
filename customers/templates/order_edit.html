<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Confirmed - Ahyera Store</title>

  <!-- Tailwind CSS -->
   <script src="./order.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    .font-heading { font-family: 'Playfair Display', serif; }
    .font-body { font-family: 'Inter', sans-serif; }
    @media (max-width: 640px) {
      .text-9xl { font-size: 6rem; }
      .text-5xl { font-size:2.5rem; }
    }
  </style>
</head>
<body class="bg-gray-50 font-body min-h-screen py-8 px-4">

  <div class="max-w-4xl mx-auto">

    <!-- Success Header -->
    <div id="success-header" class="text-center mb-12">
      <i class="fas fa-check-circle text-9xl text-green-500 mb-6"></i>
      <h1 class="text-4xl md:text-5xl font-heading font-bold text-gray-800 mb-4">
        Thank You for Your Order!
      </h1>
      <p class="text-xl md:text-2xl text-gray-600">Your order has been placed successfully</p>
      <p class="text-lg text-yellow-600 font-bold mt-6">
        Edit or cancel within <span class="text-red-600">24 hours</span>
      </p>
    </div>

    <!-- Empty Order Message -->
    <div id="no-order-message" class="hidden text-center py-20">
      <i class="fas fa-shopping-bag text-9xl text-gray-400 mb- mb-6"></i>
      <h1 class="text-4xl md:text-5xl font-heading font-bold text-gray-700 mb-4">
        Let's Place Another Order!
      </h1>
      <a href="index.html" class="inline-block bg-pink-600 text-white px-12 py-6 rounded-2xl text-2xl font-bold hover:bg-pink-700">
        Shop Now
      </a>
    </div>

    <!-- Order Card -->
    <div id="order-card" class="bg-white rounded-3xl shadow-xl p-6 md:p-10">
      <h2 class="text-3xl font-bold mb-8 text-center text-pink-600">Order Summary</h2>
      
      <div id="order-items" class="space-y-6"></div>

      <div class="mt-10 pt-8 border-t-4 border-dashed border-gray-300">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-lg font-medium">
          <div><strong>Order ID:</strong> <span id="order-id"></span></div>
          <div><strong>Date:</strong> <span id="order-date"></span></div>
          <div><strong>Payment:</strong> <span id="payment-method" class="text-green-600 font-bold"></span></div>
          <div class="text-right">
            <strong class="text-2xl">Total:</strong><br>
            <span id="total-amount" class="text-4xl text-pink-600 font-bold">PKR 0</span>
          </div>
        </div>
      </div>

      <div class="text-center mt-10">
        <button id="edit-order-btn" class="bg-blue-600 text-white px-10 py-5 rounded-2xl text-xl font-bold hover:bg-blue-700 shadow-lg">
          Edit Order
        </button>
      </div>

      <!-- Edit Mode -->
      <div id="edit-form" class="hidden mt-10 bg-gray-100 rounded-2xl p-8">
        <h3 class="text-2xl font-bold text-center mb-8">Edit Your Order</h3>
        <div id="edit-items" class="space-y-6"></div>
        <div class="text-center mt-10">
          <button id="save-changes" class="bg-green-600 text-white px-12 py-4 rounded-2xl text-xl font-bold hover:bg-green-700">
            Save Changes
          </button>
          <button id="cancel-edit" class="ml-4 bg-gray-600 text-white px-10 py-4 rounded-2xl text-xl font-bold">
            Cancel
          </button>
        </div>
      </div>
    </div>

    <div class="text-center mt-12">
      <a href="./checkout.html" class="bg-pink-600 text-white px-12 py-6 rounded-2xl text-2xl font-bold hover:bg-pink-700 inline-block">
        Continue Shopping
      </a>
    </div>
  </div>

</body>
</html>
